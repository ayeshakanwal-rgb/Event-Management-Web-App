<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Interactive Event Management web app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Event Horizon</h1>
    </header>

    <!-- Search Bar -->
    <section class="search-section">
        <input type="text" id="search" placeholder="Search events by name or date...">
    </section>

    <!-- Event List Section -->
    <section id="event-list" class="event-list">
        <!-- Events will be displayed here dynamically -->
    </section>

    <!-- Add Event Form -->
    <section class="form-section">
        <h2>Add New Event</h2>
        <form id="event-form">
            <input type="text" id="event-name" placeholder="Event Name" required>
            <input type="date" id="event-date" required>
            <textarea id="event-desc" placeholder="Event Description" required></textarea>
            <button type="submit">Add Event</button>
            <p id="warning" class="warning"></p>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>Ayesha kanwal - 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
